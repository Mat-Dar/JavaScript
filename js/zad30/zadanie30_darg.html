<html> 
     <head> 
           <script type="text/javascript"> 
                 var pudelko = { 
                       kolor: 'Czerwony', 
					   pochodzenie: 'Czechy', 
                       tworca: 'Andrzej', 
                       pokaz: function () { 
                            document.write(this.kolor + ' pudelko stworzone w ' + this.pochodzenie + ' przez ' + this.tworca) 
                       } 
                 } 
  pudelko.pokaz(); 
            </script> 
     </head> 
<body> 
 <br> 
   Programowanie obiektowe. <br> 
     Obiekt  to  pudelko<br> 
     Pola:<br> 
     Kolor<br> 
     Twórca<br> 
     Pochodzenie<br> 
     metoda:  pokaz<br> 
</body> 
</html>
