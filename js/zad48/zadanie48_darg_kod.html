<!DOCTYPE html>
<html>
<head>
    <title>Sprawdzenie danych Dargacz </title>
    <meta charset="utf-8">
</head>
<body>
    <div style="color:red;font-size:50px;">
        <script language="JavaScript">
            do {
                var liczba1=prompt("wysokość=","");
                var h_dar=parseFloat(liczba1);
            } while (h_dar<=0);
            do {
                var liczba1=prompt("podstawę=","");
                var a_dar=parseFloat(liczba1);
            } while(!(a_dar>0));
            var Pole=a_dar*h_dar/2;
            document.write("Pole="+Pole.toFixed(2)+" cm^2"+"<br>");
        </script>
    </div>
</body>
</html>
</textarea>
