<!DOCTYPE html>
<html>
<head>
    <title>Dargacz Z51</title>
    <meta charset="utf-8">
</head>
<body>
    <div style="color:red;font-size:50px;">
        <script language="JavaScript">
            var silnia_dar = 1;
            var n_dar = parseInt(prompt("n = ",""));
            for (var i_dar = 1; i_dar<=n_dar; i_dar++){
                silnia_dar*=i_dar;
            }
            document.write(n_dar + "! = " + silnia_dar.toFixed(0));
        </script>
    </div>
</body>
</html>
