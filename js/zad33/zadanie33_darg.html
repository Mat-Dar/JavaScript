<script>
 
function User(email, haslo, avatar)
{
this.email = email;
this.haslo = haslo;
this.avatar = avatar;
}
 
var userListdar = new Array();
 
function addUserdar(user)
{
userListdar.push(user);
}
 
function logindar(email, haslo)
{
for(var i=0; i<userListdar.length; i++)
{
if(userListdar[i].email == email && userListdar[i].haslo == haslo)
{
return true;
}
}
return false;
}
 
var u1 = new User("cos@cos.pl","1234","avatar.jpg");
addUserdar(u1);
 
var emaildar = prompt("Podaj email:");
var haslodar = prompt("Podaj hasło:");
 
if(logindar(emaildar, haslodar))
{
document.write("<font color='green'>Zalogowano poprawnie</font>");
}
else
{
document.write("<font color='red'>Błędne dane</font>");
}
 
</script>
